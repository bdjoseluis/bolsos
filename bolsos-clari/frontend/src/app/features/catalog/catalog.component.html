<div class="catalog">

  <!-- ── Header ─────────────────────────────────── -->
  <header class="catalog__header">
    <h1 class="catalog__title">Catálogo</h1>
    <p class="catalog__sub">{{ products.length }} artículos</p>
  </header>

  <!-- ── Filtros ────────────────────────────────── -->
  <nav class="filters">
    <a
      *ngFor="let cat of categories"
      class="filters__chip"
      [class.filters__chip--active]="activeCategory === cat.value"
      [routerLink]="['/catalogo']"
      [queryParams]="cat.value ? { cat: cat.value } : {}"
    >
      {{ cat.label }}
    </a>
  </nav>

  <!-- ── Grid ───────────────────────────────────── -->
  <div class="products__grid" *ngIf="!loading; else skeleton">
    <article class="card" *ngFor="let p of products">
      <div class="card__img-wrap">
        <img
          [src]="p.imageUrl || 'assets/placeholder.jpg'"
          [alt]="p.name"
          loading="lazy"
        />
        <span class="card__badge" *ngIf="p.isNew">Nuevo</span>
      </div>
      <div class="card__body">
        <p class="card__cat">{{ p.category }}</p>
        <h3 class="card__name">{{ p.name }}</h3>
        <div class="card__footer">
          <span class="card__price">{{ p.price | currency:'EUR':'symbol':'1.2-2' }}</span>
          <button class="btn btn--icon" title="Añadir al carrito">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" width="18" height="18">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
          </button>
        </div>
      </div>
    </article>
  </div>

  <ng-template #skeleton>
    <div class="products__grid">
      <div class="skeleton-card" *ngFor="let i of skeletons"></div>
    </div>
  </ng-template>

</div>
