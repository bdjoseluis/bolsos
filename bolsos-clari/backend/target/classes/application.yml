spring:
  datasource:
    url: jdbc:h2:mem:bolsos_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true   # accede en http://localhost:8080/h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

server:
  port: 8080

logging:
  level:
    com.tienda.bolsos: DEBUG
    org.hibernate.SQL: WARN
